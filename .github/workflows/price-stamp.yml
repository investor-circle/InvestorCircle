name: Nightly Price Stamp

on:
  schedule:
    - cron: '30 15 * * 1-5'   # 9:00pm IST = 3:30pm UTC, weekdays
  workflow_dispatch:
    inputs:
      stamp_date:
        description: 'Date to stamp (YYYY-MM-DD). Leave empty for today.'
        required: false
        default: ''

jobs:
  stamp-prices:
    name: Stamp market prices
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'       # match your deploy.yml node version
          # no cache here — we install directly below

      - name: Install batch dependencies
        run: npm install --no-save pg   # runs at repo root, no lock file needed

      - name: Run price stamping batch
        env:
          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
          TWELVE_DATA_KEY:   ${{ secrets.TWELVE_DATA_KEY }}
          STAMP_DATE:        ${{ github.event.inputs.stamp_date }}
        run: node scripts/stamp-prices.js

      - name: Report result
        if: always()
        run: echo "Price stamp finished with status ${{ job.status }}"
